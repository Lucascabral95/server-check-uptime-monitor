version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: servercheck-db
    restart: unless-stopped
    env_file:
      - ./apps/backend-uptime/.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U servercheck'] 
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servercheck-network

  redis:
    image: redis:7-alpine
    container_name: servercheck-redis
    restart: unless-stopped
    env_file:
      - ./apps/backend-uptime/.env
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servercheck-network

  backend-uptime:
    build:
      context: ./apps/backend-uptime
      dockerfile: Dockerfile
    container_name: servercheck-backend-uptime
    restart: unless-stopped
    env_file:
      - ./apps/backend-uptime/.env
    environment:
      # .env está pensado para correr el backend en el host contra Postgres/
      # Redis dockerizados vía sus puertos publicados (localhost:5432/6379).
      # Acá el backend corre DENTRO de la red de compose, así que necesita
      # los hostnames de servicio en vez de localhost. `environment:` pisa a
      # `env_file:`, así que esto no toca el .env compartido con los otros
      # servicios ni con el uso en host.
      DATABASE_URL: postgresql://servercheck:servercheck123@postgres:5432/servercheck_dev?schema=public
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    healthcheck:
      # Usa `node` en vez de curl/wget: la imagen node:20-alpine no trae
      # ninguno de los dos instalado por default.
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://localhost:4000/health/liveness', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - servercheck-network

volumes:
  postgres_data:
  redis_data:

networks:
  servercheck-network:
    driver: bridge
