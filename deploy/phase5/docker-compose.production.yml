services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: [./secrets/postgres.env]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    networks: [internal]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: [./secrets/redis.env]
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes: ["redis_data:/data"]
    networks: [internal]
  backend-uptime:
    build: ../../apps/backend-uptime
    restart: unless-stopped
    env_file: [./secrets/backend.env]
    environment:
      REDIS_HOST: redis
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: server-check-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on: [postgres, redis]
    expose: ["4000"]
    networks: [internal]
  web:
    build: ../../apps/web
    restart: unless-stopped
    environment: ["BACKEND_API_URL=http://backend-uptime:4000/api/v1"]
    depends_on: [backend-uptime]
    expose: ["3000"]
    networks: [internal]
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file: [./secrets/caddy.env]
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge, internal]
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes: ["./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro", "./observability/alerts.yml:/etc/prometheus/alerts.yml:ro", "prometheus_data:/prometheus"]
    networks: [internal]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d"]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment: ["GF_AUTH_ANONYMOUS_ENABLED=false", "GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password"]
    secrets: [grafana_admin_password]
    volumes: ["grafana_data:/var/lib/grafana"]
    networks: [internal]

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes: ["loki_data:/loki"]
    networks: [internal]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes: ["./observability/otel-collector.yml:/etc/otelcol/config.yaml:ro"]
    networks: [internal]

networks:
  edge: {}
  internal:
    internal: true

volumes:
  caddy_data: {}
  caddy_config: {}
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
  postgres_data: {}
  redis_data: {}

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
