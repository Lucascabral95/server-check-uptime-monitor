name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/backend-uptime/**"
      - "apps/web/**"
      - ".github/workflows/backend-ci.yml"
      - "package-lock.json"

jobs:
  test-backend:
    name: Test and Build Backend
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 4000
      SECRET_JWT: ci-test-secret
      JWT_EXPIRES_IN: 60d
      MY_URL_FRONTEND: http://127.0.0.1:3000
      COGNITO_ISSUER: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_abc123456
      COGNITO_CLIENT_ID: 12345678901234567890123456
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: server_check_test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/server_check_test?schema=public

      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: server-check-ci
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ci-access-key
      AWS_SECRET_ACCESS_KEY: ci-secret-key
      AWS_SES_FROM_EMAIL: ci@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/backend-uptime

      - name: Run tests
        run: npm test -- --runInBand
        working-directory: apps/backend-uptime

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: apps/backend-uptime

      - name: Build application
        run: npm run build
        working-directory: apps/backend-uptime

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            echo "Listing current directory:"
            ls -la
            exit 1
          fi

          if [ ! -f "dist/src/main.js" ]; then
            echo "Build failed: main.js not found"
            echo "Contents of dist directory:"
            ls -la dist/
            exit 1
          fi

          echo "Build successful"
        working-directory: apps/backend-uptime

  test-frontend:
    name: Test and Build Frontend
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_abc123456
      NEXT_PUBLIC_COGNITO_CLIENT_ID: 12345678901234567890123456
      NEXT_PUBLIC_API_URL_BACKEND: http://127.0.0.1:4000/api/v1
      NEXT_PUBLIC_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_URL_FRONTEND: http://127.0.0.1:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Run tests
        run: npm run test:run
        working-directory: apps/web

      - name: Build application
        run: npm run build
        working-directory: apps/web

      - name: Check build output
        working-directory: apps/web
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found"
            echo "Listing current directory:"
            ls -la
            exit 1
          fi
          echo "Build successful"
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Start frontend for E2E
        run: |
          npm start > /tmp/server-check-web.log 2>&1 &
          echo $! > /tmp/server-check-web.pid
        working-directory: apps/web

      - name: Wait for frontend server
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          echo "Frontend server did not become ready"
          cat /tmp/server-check-web.log
          exit 1

      - name: Run critical Playwright flows
        run: npm run test:e2e
        working-directory: apps/web
